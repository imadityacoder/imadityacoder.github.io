<!-- ========== HEADER / NAVIGATION ========== -->
<header
    class="fixed top-0 left-0 right-0 z-50 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md shadow-sm transition-all duration-300">
    <nav class="container mx-auto px-6 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 md:h-20">
            <!-- Logo -->
            <a href="#home"
                class="text-2xl font-bold bg-gradient-to-r from-primary-500 to-purple-600 bg-clip-text text-transparent">
                Adipage
            </a>

            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="#home" class="nav-link">Home</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#skills" class="nav-link">Skills</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#experience" class="nav-link">Experience</a>
                <a href="#testimonials" class="nav-link">Testimonials</a>
                <a href="#contact" class="nav-link">Contact</a>
            </div>

            <!-- Dark Mode Toggle & Mobile Menu Button -->
            <div class="flex items-center space-x-4">
                <!-- Dark Mode Toggle -->
                <button id="theme-toggle"
                    class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i class="fas fa-moon dark:hidden text-gray-700"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                </button>

                <!-- Mobile Menu Button -->
                <button id="mobile-menu-button"
                    class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors z-50 relative">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu-overlay" class="mobile-menu-overlay md:hidden"></div>

        <!-- Mobile Menu Container -->
        <div id="mobile-menu" class="mobile-menu-container md:hidden">
            <button id="mobile-menu-close"
                class="absolute top-6 right-6 p-2 text-gray-600 dark:text-gray-300 hover:text-primary-500 transition-colors">
                <i class="fas fa-times text-2xl"></i>
            </button>
            <div class="flex flex-col space-y-3 mt-8">
                <a href="#home" class="nav-link-mobile">Home</a>
                <a href="#about" class="nav-link-mobile">About</a>
                <a href="#skills" class="nav-link-mobile">Skills</a>
                <a href="#projects" class="nav-link-mobile">Projects</a>
                <a href="#experience" class="nav-link-mobile">Experience</a>
                <a href="#testimonials" class="nav-link-mobile">Testimonials</a>
                <a href="#contact" class="nav-link-mobile">Contact</a>
            </div>
        </div>
    </nav>
</header>
